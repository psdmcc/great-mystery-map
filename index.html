<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">

        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        #map {
            width: 998px;
            height: 661px;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>

        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[16.57831188163884,-9.009178770864947],[60.57625188163884,57.488466509863414]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // --------------------------------------------------------------------
// qgis2web feature group
// --------------------------------------------------------------------
var bounds_group = new L.featureGroup();
			// remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);

// --------------------------------------------------------------------
// Base map
// --------------------------------------------------------------------
var layer_World_Basemap_Canvas_0 = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap contributors',
        minZoom: 1,
        maxZoom: 19
    }
);

map.addLayer(layer_World_Basemap_Canvas_0);

        function pop_mysterium_geospatial_vectors_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Work_Title</th>\
                        <td>' + (feature.properties['Work_Title'] !== null ? autolinker.link(String(feature.properties['Work_Title']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">ToposText_Ancient_Site</th>\
                        <td>' + (feature.properties['ToposText_Ancient_Site'] !== null ? autolinker.link(String(feature.properties['ToposText_Ancient_Site']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Latitude_Vector'] !== null ? autolinker.link(String(feature.properties['Latitude_Vector']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Longitude_Vector'] !== null ? autolinker.link(String(feature.properties['Longitude_Vector']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Overlapping_Themes'] !== null ? autolinker.link(String(feature.properties['Overlapping_Themes']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Greek_Keywords'] !== null ? autolinker.link(String(feature.properties['Greek_Keywords']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Greek_Context_Snippet'] !== null ? autolinker.link(String(feature.properties['Greek_Context_Snippet']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Perseus_Web_URL</th>\
                        <td>' + (feature.properties['Perseus_Web_URL'] !== null ? autolinker.link(String(feature.properties['Perseus_Web_URL']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">GitHub_Data_Link</th>\
                        <td>' + (feature.properties['GitHub_Data_Link'] !== null ? autolinker.link(String(feature.properties['GitHub_Data_Link']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Temporal_Tier'] !== null ? autolinker.link(String(feature.properties['Temporal_Tier']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">temporal_scale</th>\
                        <td>' + (feature.properties['temporal_scale'] !== null ? autolinker.link(String(feature.properties['temporal_scale']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_mysterium_geospatial_vectors_1_0(feature) {
            switch(String(feature.properties['temporal_scale'])) {
                case 'Tier 1: Classical Antiquity (5th-4th C. BCE)':
                    return {
                pane: 'pane_mysterium_geospatial_vectors_1',
                radius: 10.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(215,25,28,1.0)',
                interactive: true,
            }
                    break;
                case 'Tier 2: Roman Imperial Peak (1st-2nd C. CE)':
                    return {
                pane: 'pane_mysterium_geospatial_vectors_1',
                radius: 20.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(253,174,97,1.0)',
                interactive: true,
            }
                    break;
                case 'Tier 3: Late Antiquity (3rd-5th C. CE)':
                    return {
                pane: 'pane_mysterium_geospatial_vectors_1',
                radius: 10.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(4,79,255,1.0)',
                interactive: true,
            }
                    break;
                case 'Tier 4: Byzantine Transition (6th C. CE+)':
                    return {
                pane: 'pane_mysterium_geospatial_vectors_1',
                radius: 10.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(200,164,221,1.0)',
                interactive: true,
            }
                    break;
                default:
                    return {
                pane: 'pane_mysterium_geospatial_vectors_1',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(43,131,186,1.0)',
                interactive: true,
            }
                    break;
            }
        }
        map.createPane('pane_mysterium_geospatial_vectors_1');
        map.getPane('pane_mysterium_geospatial_vectors_1').style.zIndex = 401;
        map.getPane('pane_mysterium_geospatial_vectors_1').style['mix-blend-mode'] = 'normal';
        var layer_mysterium_geospatial_vectors_1 = new L.geoJson(json_mysterium_geospatial_vectors_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_mysterium_geospatial_vectors_1',
            layerName: 'layer_mysterium_geospatial_vectors_1',
            pane: 'pane_mysterium_geospatial_vectors_1',
            onEachFeature: pop_mysterium_geospatial_vectors_1,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_mysterium_geospatial_vectors_1_0(feature));
            },
        });
        bounds_group.addLayer(layer_mysterium_geospatial_vectors_1);
        map.addLayer(layer_mysterium_geospatial_vectors_1);
        
        var overlaysTree = [
            {label: 'mysterium_geospatial_vectors<br /><table><tr><td style="text-align: center;"><img src="legend/mysterium_geospatial_vectors_1_Tier1ClassicalAntiquity5th4thCBCE0.png" /></td><td>Tier 1: Classical Antiquity (5th-4th C. BCE)</td></tr><tr><td style="text-align: center;"><img src="legend/mysterium_geospatial_vectors_1_Tier2RomanImperialPeak1st2ndCCE1.png" /></td><td>Tier 2: Roman Imperial Peak (1st-2nd C. CE)</td></tr><tr><td style="text-align: center;"><img src="legend/mysterium_geospatial_vectors_1_Tier3LateAntiquity3rd5thCCE2.png" /></td><td>Tier 3: Late Antiquity (3rd-5th C. CE)</td></tr><tr><td style="text-align: center;"><img src="legend/mysterium_geospatial_vectors_1_Tier4ByzantineTransition6thCCE3.png" /></td><td>Tier 4: Byzantine Transition (6th C. CE+)</td></tr><tr><td style="text-align: center;"><img src="legend/mysterium_geospatial_vectors_1_4.png" /></td><td></td></tr></table>', layer: layer_mysterium_geospatial_vectors_1},
            {label: "World Basemap Canvas", layer: layer_World_Basemap_Canvas_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: false, 
        });
        lay.addTo(map);
		document.addEventListener("DOMContentLoaded", function() {
            // set new Layers List height which considers toggle icon
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height 
                        || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            // toggle Collapsed/Expanded and apply new Layers List height
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight()
            });	
			// apply new Layers List height if toggle layerstree
			if (controlLayersElement) {
				controlLayersElement.addEventListener('click', function(event) {
					var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
					if (toggleLayerHeaderPointer) {
						newLayersListHeight();
					}
				});
			}
            // Collapsed/Expanded at Start to apply new height
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            // Collapsed touch/small screen
            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }  
        });       
    
        resetLabels([layer_mysterium_geospatial_vectors_1]);
        map.on("zoomend", function(){
            resetLabels([layer_mysterium_geospatial_vectors_1]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_mysterium_geospatial_vectors_1]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_mysterium_geospatial_vectors_1]);
        });
        </script>
    </body>
</html>
