<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Mystery Map Viewer</title>
    
    <!-- 1. CORRECT LEAFLET STYLE SHEET PATH - PLACE INSIDE HEAD -->
    <link rel="stylesheet" href="https://unpkg.com" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #f8f9fa;
        }
        #map-container {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

    <!-- 2. THE SCREEN POSITION WINDOW CANVAS -->
    <div id="map-container"></div>

    <!-- 3. CORRECT LEAFLET CORE CODE LIBRARY - PLACE BEFORE RUNNING SCRIPTS -->
    <script src="https://unpkg.com"></script>

    <script>
        // 4. CHRONOLOGICAL EXECUTION PIPELINE
        // Once libraries load, initialize the coordinate system engine centered over Greece
        const mapObject = L.map('map-container').setView([37.9838, 23.7275], 6);

        // Append base graphic layers natively
        L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(mapObject);
    </script>
</body>
</html>
